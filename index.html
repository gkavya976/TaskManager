<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Manager Pro</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#aeafb1,#e3e5e8);
min-height:100vh;
color:#faf9f9;
}

.container{
width:95%;
max-width:1200px;
margin:auto;
padding:20px;
}

/* LOGIN PAGE */

.login-page{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
width:400px;
background:rgba(57, 32, 32, 0.447);
backdrop-filter:blur(12px);
padding:35px;
border-radius:20px;
box-shadow:0 8px 30px rgba(0,0,0,.3);
}

.login-box h1{
text-align:center;
margin-bottom:10px;
}

.login-box p{
text-align:center;
color:#cbd5e1;
margin-bottom:25px;
}

.login-box input{
width:100%;
padding:14px;
border:none;
outline:none;
border-radius:10px;
margin-bottom:15px;
background:#334155;
color:#fff;
}

.login-btn{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#3b82f6;
color:#fff;
font-size:16px;
cursor:pointer;
transition:.3s;
}

.login-btn:hover{
background:#2563eb;
}

/* DASHBOARD */

.dashboard{
display:none;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.header h2{
font-size:28px;
}

.logout-btn{
padding:10px 18px;
border:none;
border-radius:10px;
background:#ef4444;
color:white;
cursor:pointer;
}

/* STATS */

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card h3{
font-size:18px;
color:#cbd5e1;
margin-bottom:10px;
}

.card p{
font-size:30px;
font-weight:bold;
}

/* CONTROLS */

.controls{
display:grid;
grid-template-columns:1fr 180px;
gap:15px;
margin-bottom:20px;
}

.search-box input{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#d3d7dc;
color:rgb(20, 17, 17);
}

.filter-box select{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#e8edf4;
color:rgb(26, 5, 5);
}

.add-task{
background:#d1d7e0;
padding:20px;
border-radius:20px;
margin-bottom:25px;
display:grid;
grid-template-columns:2fr 1fr 150px;
gap:15px;
}

.add-task input{
padding:14px;
border:none;
border-radius:10px;
background:#e7eaed;
color:rgb(21, 14, 14);
}

.add-task button{
border:none;
border-radius:10px;
background:#22c55e;
color:white;
cursor:pointer;
font-weight:bold;
}

.task-list{
display:grid;
gap:15px;
}

.task{
background:#d9dee6;
padding:18px;
border-radius:15px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

.task-info h4{
margin-bottom:6px;
}

.task-info span{
font-size:14px;
color:#090f16;
}
.task-actions{
display:flex;
gap:10px;
}

.task-actions button{
width:42px;
height:42px;
border:none;
border-radius:10px;
cursor:pointer;
color:rgb(32, 18, 18);
font-size:15px;
}

.complete-btn{
background:#22c55e;
}

.edit-btn{
background:#3b82f6;
}

.delete-btn{
background:#ef4444;
}

.completed h4{
text-decoration:line-through;
color:#94a3b8;
}

.completed{
opacity:.8;
}

@media(max-width:768px){

.controls{
grid-template-columns:1fr;
}

.add-task{
grid-template-columns:1fr;
}

.header{
flex-direction:column;
gap:15px;
}

.task{
flex-direction:column;
align-items:flex-start;
gap:15px;
}

.task-actions{
width:100%;
justify-content:flex-end;
}
}

</style>
</head>

<body>

<!-- LOGIN PAGE -->

<div class="login-page" id="loginPage">

<div class="login-box">

<h1>Task Manager Pro</h1>

<p>Manage Your Daily Productivity</p>

<input
type="text"
id="username"
placeholder="Enter Username">

<button
class="login-btn"
onclick="login()">
Login
</button>

</div>

</div>

<!-- DASHBOARD -->

<div class="dashboard container" id="dashboard">

<div class="header">

<h2>
<i class="fa-solid fa-list-check"></i>
Task Manager Pro
</h2>

<button
class="logout-btn"
onclick="logout()">
Logout
</button>

</div>

<!-- STATS -->

<div class="stats">

<div class="card">
<h3>Total Tasks</h3>
<p id="totalTasks">0</p>
</div>

<div class="card">
<h3>Pending</h3>
<p id="pendingTasks">0</p>
</div>

<div class="card">
<h3>Completed</h3>
<p id="completedTasks">0</p>
</div>

</div>

<!-- SEARCH + FILTER -->

<div class="controls">

<div class="search-box">
<input
type="text"
id="searchInput"
placeholder="Search Tasks..."
onkeyup="loadTasks()">
</div>

<div class="filter-box">
<select
id="filterSelect"
onchange="loadTasks()">

<option value="all">
All Tasks
</option>

<option value="pending">
Pending
</option>

<option value="completed">
Completed
</option>

</select>
</div>

</div>

<!-- ADD TASK -->

<div class="add-task">

<input
type="text"
id="taskInput"
placeholder="Enter Task">

<input
type="date"
id="dueDate">

<button onclick="addTask()">
Add Task
</button>

</div>

<!-- TASK LIST -->

<div
class="task-list"
id="taskList">
</div>

</div>
<script>

let currentUser = localStorage.getItem("currentUser");

if(currentUser){
showDashboard();
}

/* LOGIN */

function login(){

let username =
document.getElementById("username").value.trim();

if(username === ""){
alert("Please enter username");
return;
}

currentUser = username;

localStorage.setItem(
"currentUser",
username
);

if(!localStorage.getItem(username)){
localStorage.setItem(
username,
JSON.stringify([])
);
}

showDashboard();
}

/* LOGOUT */

function logout(){

localStorage.removeItem("currentUser");

location.reload();
}

/* SHOW DASHBOARD */

function showDashboard(){

document.getElementById("loginPage")
.style.display = "none";

document.getElementById("dashboard")
.style.display = "block";

loadTasks();
}

/* GET TASKS */

function getTasks(){

return JSON.parse(
localStorage.getItem(currentUser)
) || [];

}

/* SAVE TASKS */

function saveTasks(tasks){

localStorage.setItem(
currentUser,
JSON.stringify(tasks)
);

}

/* ADD TASK */

function addTask(){

let taskInput =
document.getElementById("taskInput");

let dueDate =
document.getElementById("dueDate");

let taskText =
taskInput.value.trim();

if(taskText === ""){
alert("Enter a task");
return;
}

let tasks = getTasks();

tasks.push({
text: taskText,
date: dueDate.value,
completed:false
});

saveTasks(tasks);

taskInput.value="";
dueDate.value="";

loadTasks();
}

/* LOAD TASKS */

function loadTasks(){

let taskList =
document.getElementById("taskList");

taskList.innerHTML="";

let tasks = getTasks();

let search =
document.getElementById("searchInput")
.value.toLowerCase();

let filter =
document.getElementById("filterSelect")
.value;

let filteredTasks =
tasks.filter(task=>{

let matchSearch =
task.text.toLowerCase()
.includes(search);

let matchFilter = true;

if(filter==="pending"){
matchFilter = !task.completed;
}

if(filter==="completed"){
matchFilter = task.completed;
}

return matchSearch && matchFilter;

});

filteredTasks.forEach((task,index)=>{

let div =
document.createElement("div");

div.className =
task.completed ?
"task completed"
:
"task";

div.innerHTML = `

<div class="task-info">

<h4>${task.text}</h4>

<span>
Due Date:
${task.date || "Not Set"}
</span>

</div>

<div class="task-actions">

<button
class="complete-btn"
onclick="toggleTask(${index})">

<i class="fa-solid fa-check"></i>

</button>

<button
class="edit-btn"
onclick="editTask(${index})">

<i class="fa-solid fa-pen"></i>

</button>

<button
class="delete-btn"
onclick="deleteTask(${index})">

<i class="fa-solid fa-trash"></i>

</button>

</div>

`;

taskList.appendChild(div);

});

updateStats();
}

/* COMPLETE TASK */

function toggleTask(index){

let tasks = getTasks();

tasks[index].completed =
!tasks[index].completed;

saveTasks(tasks);

loadTasks();
}

/* EDIT TASK */

function editTask(index){

let tasks = getTasks();

let newTask =
prompt(
"Edit Task",
tasks[index].text
);

if(newTask !== null &&
newTask.trim() !== ""){

tasks[index].text =
newTask.trim();

saveTasks(tasks);

loadTasks();
}

}

/* DELETE TASK */

function deleteTask(index){

let confirmDelete =
confirm(
"Delete this task?"
);

if(!confirmDelete) return;

let tasks = getTasks();

tasks.splice(index,1);

saveTasks(tasks);

loadTasks();
}

/* UPDATE STATS */

function updateStats(){

let tasks = getTasks();

let total =
tasks.length;

let completed =
tasks.filter(
task=>task.completed
).length;

let pending =
total - completed;

document.getElementById(
"totalTasks"
).innerText = total;

document.getElementById(
"completedTasks"
).innerText = completed;

document.getElementById(
"pendingTasks"
).innerText = pending;

}

</script>

</body>
</html>


<h1>Task Manager Pro</h1>
<p>
Turn Goals Into Achievements
</p>
<h2>
🚀 Task Manager Pro
</h2>

<p class="quote">
Success is the sum of small efforts
repeated every day.
</p>
<head>

<style>
body{
background:
linear-gradient(rgba(20, 69, 176, 0.85),
rgba(227, 227, 228, 0.9)),
url("https://images.unsplash.com/photo-1497366754035-f200968a6e72");
background-size:cover;
background-position:center;
background-attachment:fixed;
min-height:100vh;
}
@keyframes fadeUp{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.login-box,
.card,
.task{
animation:fadeUp .8s ease;
}
.card,
.task,
.add-task{
background:rgba(206, 202, 202, 0.08);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,.1);
}
.card:hover{
transform:translateY(-8px);
box-shadow:
0 10px 30px rgba(59,130,246,.35);
}

.task:hover{
transform:scale(1.02);
transition:.3s;
}
.login-btn,
.add-task button,
.logout-btn{
transition:.3s;
}

.login-btn:hover,
.add-task button:hover{
transform:translateY(-3px);
}

.login-btn:active,
.add-task button:active{
transform:scale(.96);
}
@keyframes floating{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-8px);
}

100%{
transform:translateY(0px);
}

}

.card{
animation:
fadeUp .8s ease,
floating 4s ease-in-out infinite;
}
.task{
animation:taskPop .4s ease;
}

@keyframes taskPop{

from{
opacity:0;
transform:scale(.8);
}

to{
opacity:1;
transform:scale(1);
}

}


</style>

</head>
